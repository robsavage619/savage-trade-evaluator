name: Claude PR Review

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: Lint + typecheck (Rob conventions gate)
        run: |
          uv run ruff format --check src/ tests/
          uv run ruff check src/ tests/
          uv run pyright src/ tests/

      - name: Claude review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this PR against the project's conventions in CLAUDE.md and global conventions in ~/.claude/CLAUDE.md.

            Focus on:
            - Schema version bumps when DDL changes (src/savage_trade_evaluator/storage/schemas.py:SCHEMA_VERSION)
            - DuckDB write-lock safety (no concurrent ingest + read patterns)
            - Outcome views staying metric-agnostic (no hardcoded WAR)
            - No FanGraphs scraping attempts (project rule — blocked)
            - Conventional commit format on commits
            - No `Optional[X]` (use `X | None`), no bare `except`, no `print()` in library code
            - Anti-patterns in CLAUDE.md "Anti-patterns to avoid" section

            Be terse. Surface conflicts, don't average them. Skip nitpicks.
