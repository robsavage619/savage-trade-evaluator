<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200">
  <defs>
    <!-- Left-panel warm glow -->
    <radialGradient id="lglow" cx="22%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a2545" stop-opacity="1"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="1"/>
    </radialGradient>

    <!-- Dot grid -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.7" fill="#1a2238" fill-opacity="1"/>
    </pattern>

    <!-- Quadrant tints (right panel only) -->
    <radialGradient id="qg" cx="80%" cy="25%" r="45%">
      <stop offset="0%"   stop-color="#3ddc97" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qr" cx="80%" cy="85%" r="45%">
      <stop offset="0%"   stop-color="#ff5d73" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── BACKGROUND ─────────────────────────────────────────── -->
  <rect width="1280" height="200" fill="#07090f"/>
  <rect width="1280" height="200" fill="url(#lglow)"/>
  <rect width="1280" height="200" fill="url(#dots)"/>

  <!-- Quadrant tints clipped to right panel -->
  <rect x="640" y="0" width="640" height="200" fill="url(#qg)"/>
  <rect x="640" y="0" width="640" height="200" fill="url(#qr)"/>

  <!-- ── LEFT PANEL ─ Wordmark ───────────────────────────────── -->

  <!-- SA Scatter Mark  (anchor: 75, 100 — centered vertically) -->
  <!-- Dashed regression line: bottom-left → top-right -->
  <line x1="68" y1="128" x2="132" y2="68"
    stroke="#ff8a3d" stroke-width="1.5" stroke-opacity="0.45"
    stroke-dasharray="4 3" stroke-linecap="round"/>
  <!-- Ascending data nodes -->
  <circle cx="68"  cy="128" r="3.5" fill="#e0e5f4" fill-opacity="0.10"/>
  <circle cx="84"  cy="114" r="4"   fill="#e0e5f4" fill-opacity="0.18"/>
  <circle cx="100" cy="100" r="4.5" fill="#e0e5f4" fill-opacity="0.27"/>
  <circle cx="116" cy="84"  r="4"   fill="#e0e5f4" fill-opacity="0.22"/>
  <!-- Highlighted node — the credible finding -->
  <circle cx="132" cy="68"  r="11"  fill="#ff8a3d" fill-opacity="0.12"/>
  <circle cx="132" cy="68"  r="6"   fill="#ff8a3d"/>

  <!-- Wordmark -->
  <text x="157" y="98"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="38" font-weight="800" fill="#e0e5f4" letter-spacing="-1.5">SAVAGE ANALYTICS</text>

  <!-- Tagline -->
  <text x="160" y="121"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="10" font-weight="500" fill="#5a6896" letter-spacing="5">BASEBALL INTELLIGENCE</text>

  <!-- Orange rule -->
  <line x1="159" y1="133" x2="596" y2="133" stroke="#ff8a3d" stroke-width="0.75" stroke-opacity="0.38"/>

  <!-- Stats row -->
  <text x="159" y="155"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="9" fill="#364264" letter-spacing="1.5">35 ROUNDS  ·  SCHEMA v20  ·  1.29M ROWS  ·  30 DECISIONS</text>

  <!-- ── DIVIDER ──────────────────────────────────────────────── -->
  <line x1="634" y1="22" x2="634" y2="178" stroke="#1a2238" stroke-width="1"/>

  <!-- ── RIGHT PANEL ─ 2D Org-Quality Map ───────────────────── -->
  <!-- Panel coordinate system:
       x: dev WAR total  range [650, 1780]  →  svg-x [664, 1266]  (scale = 602/1130)
       y: trade Δ        range [-0.42, +0.15] → axis at y=84 (tradeΔ=0)
           positive (up)  :  y = 84  - (tradeΔ / 0.15) * 42
           negative (down):  y = 84  + (|tradeΔ| / 0.42) * 108   -->

  <!-- Panel title -->
  <text x="653" y="31"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="7.5" font-weight="500" fill="#364264" letter-spacing="2.5">2D ORG-QUALITY MAP — ALL 30 FRANCHISES</text>

  <!-- Axes -->
  <!-- Horizontal: trade Δ = 0 at y=84 -->
  <line x1="658" y1="84" x2="1268" y2="84" stroke="#1a2238" stroke-width="1"/>
  <!-- Vertical: median dev WAR ≈ 1200  →  x = 664 + (550/1130)*602 = 664+293 = 957 -->
  <line x1="957" y1="40" x2="957"  y2="194" stroke="#1a2238" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="1261" y="81" text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="6.5" fill="#232c46">dev WAR →</text>
  <text x="961" y="46"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="6.5" fill="#232c46">trade Δ ↑</text>

  <!-- Quadrant micro-labels -->
  <text x="670" y="57"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="6" fill="#1a2238">LO DEV / POS</text>
  <text x="1258" y="57" text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="6" fill="#1a2238">HI DEV / POS</text>
  <text x="670" y="191"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="6" fill="#1a2238">LO DEV / NEG</text>
  <text x="1258" y="191" text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="6" fill="#1a2238">HI DEV / NEG</text>

  <!-- ── ORG DOTS (unnamed, dim) ─────────────────────────────── -->
  <!-- tradeΔ > 0: y = 84 - (tradeΔ/0.15)*42  -->
  <!-- tradeΔ < 0: y = 84 + (|tradeΔ|/0.42)*108 -->
  <!-- dev_x = 664 + ((total - 650)/1130)*602  -->

  <!-- BOS  total≈1430, Δ≈-0.05  →  x=1079, y=97  -->
  <circle cx="1079" cy="97"  r="2.5" fill="#364264"/>
  <!-- ATL  total≈1350, Δ≈+0.03  →  x=1037, y=76  -->
  <circle cx="1037" cy="76"  r="2.5" fill="#364264"/>
  <!-- ARI  total≈1300, Δ≈+0.07  →  x=1011, y=65  -->
  <circle cx="1011" cy="65"  r="2.5" fill="#364264"/>
  <!-- OAK  total≈1380, Δ≈-0.26  →  x=1053, y=151 -->
  <circle cx="1053" cy="151" r="2.5" fill="#364264"/>
  <!-- NYM  total≈1130, Δ≈-0.04  →  x=921,  y=94  -->
  <circle cx="921"  cy="94"  r="2.5" fill="#364264"/>
  <!-- MIN  total≈1220, Δ≈-0.12  →  x=969,  y=115 -->
  <circle cx="969"  cy="115" r="2.5" fill="#364264"/>
  <!-- CHC  total≈1150, Δ≈+0.02  →  x=930,  y=78  -->
  <circle cx="930"  cy="78"  r="2.5" fill="#364264"/>
  <!-- MIL  total≈1080, Δ≈+0.04  →  x=893,  y=73  -->
  <circle cx="893"  cy="73"  r="2.5" fill="#364264"/>
  <!-- DET  total≈1100, Δ≈-0.08  →  x=904,  y=105 -->
  <circle cx="904"  cy="105" r="2.5" fill="#364264"/>
  <!-- PIT  total≈1000, Δ≈-0.12  →  x=851,  y=115 -->
  <circle cx="851"  cy="115" r="2.5" fill="#364264"/>
  <!-- PHI  total≈1150, Δ≈-0.01  →  x=930,  y=87  -->
  <circle cx="931"  cy="87"  r="2.5" fill="#364264"/>
  <!-- KCR  total≈ 940, Δ≈-0.02  →  x=819,  y=89  -->
  <circle cx="819"  cy="89"  r="2.5" fill="#364264"/>
  <!-- CIN  total≈ 980, Δ≈-0.10  →  x=840,  y=110 -->
  <circle cx="840"  cy="110" r="2.5" fill="#364264"/>
  <!-- COL  total≈ 760, Δ≈-0.20  →  x=724,  y=136 -->
  <circle cx="724"  cy="136" r="2.5" fill="#364264"/>
  <!-- MIA  total≈ 800, Δ≈-0.06  →  x=745,  y=99  -->
  <circle cx="745"  cy="99"  r="2.5" fill="#364264"/>
  <!-- BAL  total≈ 970, Δ≈-0.15  →  x=835,  y=123 -->
  <circle cx="835"  cy="123" r="2.5" fill="#364264"/>
  <!-- TEX  total≈1150, Δ≈-0.18  →  x=930,  y=130 -->
  <circle cx="930"  cy="130" r="2.5" fill="#364264"/>
  <!-- WSN  total≈1020, Δ≈ 0.00  →  x=861,  y=84  -->
  <circle cx="861"  cy="84"  r="2.5" fill="#364264"/>
  <!-- TOR  total≈1280, Δ≈+0.01  →  x=999,  y=81  -->
  <circle cx="999"  cy="81"  r="2.5" fill="#364264"/>
  <!-- LAA  total≈1020, Δ≈-0.16  →  x=861,  y=125 -->
  <circle cx="862"  cy="125" r="2.5" fill="#364264"/>
  <!-- LAD  total=1508, Δ=-0.03  →  x=1121, y=92  -->
  <circle cx="1121" cy="92"  r="3"   fill="#5a6896"/>
  <!-- SEA  total=1499, Δ=-0.19  →  x=1116, y=133 -->
  <circle cx="1116" cy="133" r="3"   fill="#364264"/>
  <!-- NYY  total=1532, Δ=-0.07  →  x=1133, y=102 -->
  <circle cx="1133" cy="102" r="3"   fill="#5a6896"/>
  <!-- CHW  total≈1050, Δ≈-0.34  →  x=877,  y=171 -->
  <circle cx="877"  cy="171" r="2.5" fill="#2a1830"/>
  <!-- SDP  total= 809, Δ=-0.24  →  x=749,  y=146 -->
  <circle cx="749"  cy="146" r="2.5" fill="#2a1830"/>

  <!-- ── HIGHLIGHTED ORG DOTS ───────────────────────────────── -->

  <!-- CLE  total=1754, Δ=-0.14  →  x=1251, y=118 -->
  <circle cx="1251" cy="118" r="4.5" fill="#8a96c0" fill-opacity="0.9"/>
  <text x="1251" y="111" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="7" font-weight="700" fill="#8a96c0">CLE</text>

  <!-- STL  total=1200, Δ=+0.10  →  x=957,  y=56  -->
  <circle cx="957"  cy="56"  r="4.5" fill="#b9c1de" fill-opacity="0.9"/>
  <text x="957" y="49" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="7" font-weight="700" fill="#b9c1de">STL</text>

  <!-- HOU  total=1528, Δ=+0.05  →  x=1131, y=70  — UNIQUE QUADRANT -->
  <circle cx="1131" cy="70"  r="12"  fill="#ff8a3d" fill-opacity="0.12"/>
  <circle cx="1131" cy="70"  r="6"   fill="#ff8a3d"/>
  <text x="1147" y="67"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="8" font-weight="700" fill="#ff8a3d">HOU</text>

  <!-- TBR  total=880,  Δ=-0.37  →  x=787,  y=179 -->
  <circle cx="787"  cy="179" r="4"   fill="#ff5d73" fill-opacity="0.45"/>
  <text x="797" y="183"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="7" font-weight="600" fill="#ff5d73" fill-opacity="0.65">TBR</text>

  <!-- SFG  total=671,  Δ=-0.35  →  x=676,  y=174 -->
  <circle cx="676"  cy="174" r="4"   fill="#ff5d73" fill-opacity="0.4"/>
  <text x="687" y="170"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="7" font-weight="600" fill="#ff5d73" fill-opacity="0.6">SFG</text>

  <!-- ── BOTTOM ACCENT LINE ───────────────────────────────────── -->
  <line x1="0" y1="199" x2="1280" y2="199" stroke="#ff8a3d" stroke-width="1" stroke-opacity="0.35"/>
</svg>
